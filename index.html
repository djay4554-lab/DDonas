<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>DDonas | iOS Segmented Control</title>

<style>
:root{
  --accent:#ff3f86;
  --bg:linear-gradient(180deg,#fff,#ffe6f1,#e9ddff);
  --card:rgba(255,255,255,.75);
  --shadow:0 20px 50px rgba(0,0,0,.10);
}

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial;
}

body{
  background:var(--bg);
  color:#1c1c1e;
  padding:40px 20px;
}

/* HEADER */
h1{
  text-align:center;
  font-family:"Brush Script MT","Segoe Script",cursive;
  font-size:54px;
  color:var(--accent);
}

/* SEGMENTED CONTROL CONTAINER */
.segmented{
  position:relative;
  display:flex;
  max-width:520px;
  margin:30px auto;
  padding:6px;
  border-radius:999px;
  background:rgba(255,255,255,.6);
  backdrop-filter:blur(20px);
  box-shadow:var(--shadow);
  overflow:hidden;
}

/* SLIDER ANIMADO (LA MAGIA) */
.slider{
  position:absolute;
  top:6px;
  left:6px;
  height:calc(100% - 12px);
  width:20%;
  border-radius:999px;
  background:var(--accent);
  transition:transform .45s cubic-bezier(.2,.9,.2,1), width .45s cubic-bezier(.2,.9,.2,1);
  box-shadow:0 10px 25px rgba(255,63,134,.25);
}

/* BOTONES */
.segment{
  flex:1;
  text-align:center;
  padding:10px 8px;
  z-index:2;
  cursor:pointer;
  font-size:14px;
  user-select:none;
  transition:.25s;
  color:#333;
}

.segment.active{
  color:#fff;
  font-weight:600;
}

/* GRID */
.grid{
  max-width:900px;
  margin:30px auto;
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
  gap:18px;
  animation:fade .35s ease;
}

@keyframes fade{
  from{opacity:0; transform:translateY(10px)}
  to{opacity:1; transform:translateY(0)}
}

.card{
  background:var(--card);
  border-radius:20px;
  padding:15px;
  box-shadow:var(--shadow);
  backdrop-filter:blur(20px);
}

.img{
  height:140px;
  border-radius:16px;
  background:linear-gradient(135deg,#ffe0ec,#e6ddff);
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:40px;
}

button{
  margin-top:10px;
  width:100%;
  padding:10px;
  border:none;
  border-radius:14px;
  background:var(--accent);
  color:white;
  font-weight:600;
  cursor:pointer;
  transition:.25s;
}

button:hover{
  transform:scale(1.03);
}

/* FLOAT */
.float{
  position:fixed;
  right:18px;
  bottom:18px;
  width:58px;
  height:58px;
  border-radius:50%;
  background:#25d366;
  display:flex;
  align-items:center;
  justify-content:center;
  color:#fff;
  font-size:26px;
  box-shadow:var(--shadow);
  text-decoration:none;
}
</style>
</head>

<body>

<h1>DDonas</h1>

<!-- SEGMENTED CONTROL -->
<div class="segmented" id="segmented">

  <div class="slider" id="slider"></div>

  <div class="segment active" onclick="setTab(0)">Chocolate</div>
  <div class="segment" onclick="setTab(1)">Vainilla</div>
  <div class="segment" onclick="setTab(2)">Glaseado</div>
  <div class="segment" onclick="setTab(3)">Mixto</div>
  <div class="segment" onclick="setTab(4)">Otros</div>

</div>

<!-- CONTENT -->
<div id="content">

  <div class="grid" id="tab0">
    <div class="card">
      <div class="img">🍫</div>
      <h3>Choco Velvet</h3>
      <button>Elegir</button>
    </div>
  </div>

  <div class="grid" id="tab1" style="display:none">
    <div class="card">
      <div class="img">🍦</div>
      <h3>Vainilla Cloud</h3>
      <button>Elegir</button>
    </div>
  </div>

  <div class="grid" id="tab2" style="display:none">
    <div class="card">
      <div class="img">🍓</div>
      <h3>Glaseado Pink</h3>
      <button>Elegir</button>
    </div>
  </div>

  <div class="grid" id="tab3" style="display:none">
    <div class="card">
      <div class="img">🍩</div>
      <h3>Mix Deluxe</h3>
      <button>Elegir</button>
    </div>
  </div>

  <div class="grid" id="tab4" style="display:none">
    <div class="card">
      <div class="img">✨</div>
      <h3>Edición Chef</h3>
      <button>Elegir</button>
    </div>
  </div>

</div>

<a class="float">💬</a>

<script>

const slider = document.getElementById("slider");
const segments = document.querySelectorAll(".segment");

function setTab(i){

  // tabs content
  for(let j=0;j<5;j++){
    document.getElementById("tab"+j).style.display = (j===i) ? "grid" : "none";
  }

  // active state text
  segments.forEach(s => s.classList.remove("active"));
  segments[i].classList.add("active");

  // 🔥 ANIMACIÓN REAL TIPO iOS (SLIDER FLUIDO)
  const width = 100 / segments.length;

  slider.style.width = width + "%";
  slider.style.transform = `translateX(${i * 100}%)`;

}

</script>

</body>
</html>
