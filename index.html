<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DDonas- Las más mejores minidonas de Santiago de Cuba</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 0; padding: 0; text-align: center; }
        header { background: #ff9800; color: white; padding: 20px; }
        .productos { display: flex; justify-content: center; gap: 20px; padding: 20px; }
        .donut { border: 1px solid #ddd; border-radius: 10px; padding: 15px; width: 200px; }
        .donut img { width: 100%; border-radius: 10px; }
        footer { background: #333; color: white; padding: 10px; margin-top: 20px; }
    </style>
</head>
<body>
    <header>
        <h1>🍩 DDonas 🍩</h1>
        <p>Las donas más frescas y deliciosas de la ciudad</p>
    </header>
    <section class="productos">
        <div class="donut">
            <img src="https://via.placeholder.com/150" alt="Donut glaseada">
            <h3>Donut Glaseada</h3>
            <p>$2.00</p>
        </div>
        <div class="donut">
            <img src="https://via.placeholder.com/150" alt="Donut de chocolate">
            <h3>Donut de Chocolate</h3>
            <p>$2.50</p>
        </div>
    </section>
    <footer>
        <p>📍 Reparto Rajayoga | 📞 55123300 </p>
    </footer>
</body>
</html>
