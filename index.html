<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DDonas- Las más mejores minidonas de Santiago de Cuba</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 0; padding: 0; text-align: center; }
        header {
    background: linear-gradient(90deg, #4e342e, #8d6e63);
    color: white;
    padding: 30px;
    border-radius: 0 0 50px 50px;
}
        .productos { display: flex; justify-content: center; gap: 20px; padding: 20px; }
        .donut { border: 1px solid #ddd; border-radius: 10px; padding: 15px; width: 200px; }
        .donut img { width: 100%; border-radius: 10px; }
        footer { background: #333; color: white; padding: 10px; margin-top: 20px; }
    </style>
</head>
<body>
    <header>
        <h1>🍩 DDonas 🍩</h1>
        <p>Las mejores minidonas de Santiago de Cuba 🤤</p>
    </header>
    <section class="productos">
        <div class="donut">
            <img src="20260624_151654.jpg" alt="Donut glaseada">
            <h3>Minidonas Glaseada</h3>
            <p>$500.00</p>
            <p>6 unidades</p>
        </div>
        <div class="donut">
            <img src="20260624_151743.jpg" alt="Donut de chocolate">
            <h3>Minidonas de Chocolate</h3>
            <p>$250</p>
            <p>5 unidades</p>
        </div>
    </section>
    <footer>
        <p>📍 Reparto Rajayoga | 📞 55123300 </p>
    </footer>
</body>
</html>
